{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h1 class="h3 mb-3">Profile</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Save changes</button>
                </form>
            </div>
        </div>
        <div class="card border-danger">
            <div class="card-body">
                <h2 class="h5 text-danger">Danger zone</h2>
                <form method="post" action="{% url 'accounts:delete_account' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger" onclick="return confirm('Delete your account permanently?');">Delete account</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
